; ═══════════════════════════════════════════════════════════════════════════
; HaleHound-CYD PlatformIO Configuration
; ESP32-32E 4.0" Resistive Touch (320x480 ST7796 + XPT2046)
; Forked from HaleHound-CYD-3.2 — adapted for resistive touch on shared HSPI
; ═══════════════════════════════════════════════════════════════════════════

[platformio]
src_dir = .

[env]
build_src_filter = +<*> -<_v29_backup/>

[env:esp32-cyd-40r]
platform = espressif32@6.9.0
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 460800

; Build flags
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DBOARD_HAS_PSRAM=0
    ; Board identity — 4.0" resistive (320x480 ST7796 + XPT2046 on shared HSPI)
    ; CYD_35 enables all 320x480 display/layout code paths (shared with capacitive 3.5")
    ; CYD_40R signals XPT2046 resistive touch instead of GT911 capacitive
    -DCYD_35=1
    -DCYD_40R=1
    ; TFT_eSPI uses our custom User_Setup.h in project folder
    -DUSER_SETUP_LOADED
    -include User_Setup.h
    ; Allow override of SDK functions (deauth) and resolve SPI conflicts
    -Wl,--allow-multiple-definition
    ; RF24 library: enable 95ms timeout in write()/writeFast() to prevent infinite loops
    -DFAILURE_HANDLING

; Required libraries
lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    bblanchon/ArduinoJson@^7.0.0
    mikalhart/TinyGPSPlus@^1.0.3
    plerup/EspSoftwareSerial@^8.2.0
    sui77/rc-switch@^2.6.4
    kosme/arduinoFFT@^2.0.2
    nrf24/RF24@1.4.11
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git
    lsatan/SmartRC-CC1101-Driver-Lib@^2.5.7
    adafruit/Adafruit PN532@^1.3.3

; Partition scheme - need more space for this firmware
board_build.partitions = huge_app.csv

; Flash mode
board_build.flash_mode = dio
board_build.f_flash = 40000000L

; Monitor filters
monitor_filters = esp32_exception_decoder

; ═══════════════════════════════════════════════════════════════════════════
; NM-RF-Hat Build Target (optional)
; Uses GPIO 22 + GPIO 27 for both CC1101 and NRF24 (physical switch selects)
; One radio at a time — hat enforces this in hardware
; ═══════════════════════════════════════════════════════════════════════════

[env:esp32-cyd-40r-hat]
extends = env:esp32-cyd-40r
build_flags =
    ${env:esp32-cyd-40r.build_flags}
    -DNMRF_HAT=1
